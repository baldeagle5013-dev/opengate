<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c10;
      --surface:  #0e1419;
      --border:   #1e2d3d;
      --accent:   #39ff14;
      --accent2:  #00d4ff;
      --danger:   #ff3b5c;
      --text:     #c8d8e8;
      --muted:    #4a6070;
      --glow:     0 0 20px #39ff1430;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* Animated grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      padding: 48px 0 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .logo-title {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
    }

    .logo-title span {
      color: var(--accent);
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Add form ── */
    .add-section {
      margin-bottom: 48px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px;
    }

    .add-form {
      display: grid;
      grid-template-columns: 60px 1fr 2fr auto;
      gap: 10px;
      align-items: stretch;
    }

    @media (max-width: 680px) {
      .add-form { grid-template-columns: 60px 1fr; }
      .add-form .url-input { grid-column: 1 / -1; }
      .add-form .add-btn  { grid-column: 1 / -1; }
    }

    .input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input::placeholder { color: var(--muted); }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px #39ff1420;
    }

    .icon-input { text-align: center; font-size: 20px; }

    .add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #fff;
      box-shadow: var(--glow);
    }

    .add-btn:active { transform: scale(0.97); }

    /* ── Quick nav ── */
    .quick-nav {
      margin-bottom: 48px;
    }

    .quick-form {
      display: flex;
      gap: 10px;
    }

    .quick-form .input { flex: 1; }

    .go-btn {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .go-btn:hover {
      background: var(--accent2);
      color: #000;
      box-shadow: 0 0 20px #00d4ff40;
    }

    /* ── Site grid ── */
    .sites-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .site-count {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease both;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: #2a3f55;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px #00000060;
    }

    .card:hover::before { opacity: 1; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 12px;
      line-height: 1;
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-url {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .open-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: all 0.15s;
    }

    .open-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      box-shadow: var(--glow);
    }

    .del-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }

    .del-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: #ff3b5c15;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 12px 20px;
      border-radius: 6px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
<div class="noise"></div>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-tag">// access gateway</span>
      <h1 class="logo-title">OPEN<span>GATE</span></h1>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      <span>PROXY ONLINE</span>
    </div>
  </header>

  <!-- Quick navigate to any URL -->
  <div class="quick-nav">
    <div class="section-label">// quick navigate</div>
    <div class="quick-form">
      <input class="input" id="quickUrl" type="text" placeholder="Paste any URL → https://example.com" />
      <button class="go-btn" onclick="quickGo()">Go →</button>
    </div>
  </div>

  <!-- Add site form -->
  <div class="add-section">
    <div class="section-label">// add site to dashboard</div>
    <div class="add-form">
      <input class="input icon-input" id="newIcon" type="text" placeholder="🌐" maxlength="4" />
      <input class="input" id="newName" type="text" placeholder="Site name" />
      <input class="input url-input" id="newUrl" type="text" placeholder="https://example.com" />
      <button class="add-btn" onclick="addSite()">+ Add</button>
    </div>
  </div>

  <!-- Sites grid -->
  <div class="sites-header">
    <div class="section-label">// saved sites</div>
    <div class="site-count" id="siteCount"></div>
  </div>

  <div class="grid" id="grid">
    <div class="empty">Loading sites…</div>
  </div>

</div>

<div id="toast"></div>

<script>
  let sites = [];

  async function loadSites() {
    const res = await fetch('/api/sites');
    sites = await res.json();
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const count = document.getElementById('siteCount');
    count.textContent = sites.length + ' site' + (sites.length !== 1 ? 's' : '');

    if (sites.length === 0) {
      grid.innerHTML = '<div class="empty">No sites yet — add one above.</div>';
      return;
    }

    grid.innerHTML = sites.map((site, i) => `
      <div class="card" style="animation-delay:${i * 0.05}s">
        <div class="card-icon">${site.icon || '🌐'}</div>
        <div class="card-name">${esc(site.name)}</div>
        <div class="card-url">${esc(site.url)}</div>
        <div class="card-actions">
          <a class="open-btn" href="/proxy?url=${encodeURIComponent(site.url)}" target="_blank">Open →</a>
          <button class="del-btn" onclick="deleteSite(${site.id})" title="Remove">✕</button>
        </div>
      </div>
    `).join('');
  }

  async function addSite() {
    const name = document.getElementById('newName').value.trim();
    const url  = document.getElementById('newUrl').value.trim();
    const icon = document.getElementById('newIcon').value.trim() || '🌐';

    if (!name || !url) { toast('⚠ Name and URL are required'); return; }

    const res = await fetch('/api/sites', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, icon }),
    });
    const newSite = await res.json();
    sites.push(newSite);

    document.getElementById('newName').value = '';
    document.getElementById('newUrl').value = '';
    document.getElementById('newIcon').value = '';

    renderGrid();
    toast('✓ ' + name + ' added');
  }

  async function deleteSite(id) {
    await fetch('/api/sites/' + id, { method: 'DELETE' });
    sites = sites.filter(s => s.id !== id);
    renderGrid();
    toast('Removed');
  }

  function quickGo() {
    let url = document.getElementById('quickUrl').value.trim();
    if (!url) return;
    if (!url.startsWith('http')) url = 'https://' + url;
    window.open('/proxy?url=' + encodeURIComponent(url), '_blank');
  }

  document.getElementById('quickUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') quickGo();
  });

  document.getElementById('newUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSite();
  });

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  loadSites();
</script>
</body>
</html>
